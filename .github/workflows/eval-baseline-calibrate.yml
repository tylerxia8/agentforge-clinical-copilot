# Calibrate the W2 eval baseline — manually triggered.
#
# What it does:
#   1. Runs the 63-case W2 eval suite against the deployed staging
#      copilot-agent service.
#   2. Saves the per-category + per-rubric pass rates to
#      agent-service/evals/w2/baseline.json.
#   3. Uploads the proposed baseline.json as a workflow artifact
#      (`w2-proposed-baseline`) and renders the diff in the run summary.
#      The operator inspects the numbers and commits the new baseline
#      manually when satisfied.
#
# Why we don't auto-commit:
#   The agentforge-clinical-copilot Railway service auto-deploys on
#   every push to main, which creates a 60-90s 502 window. When the
#   workflow auto-pushed the baseline, that window flunked the late-
#   stage cases of the NEXT calibration run, locking in worse numbers
#   each time. Manual commit breaks the loop.
#
# When to run:
#   - After a known-good merge whose pass rates you want to lock in
#     as the new floor for the eval-gate workflow.
#
# How to run:
#   GitHub Actions tab -> "Calibrate W2 eval baseline" -> Run workflow.
#   When the run completes, download the `w2-proposed-baseline` artifact,
#   replace agent-service/evals/w2/baseline.json locally, commit, push.
#
# Cost / wall time:
#   ~$2.50 in Anthropic credits (63 cases through Claude Sonnet 4.6),
#   ~10 min wall time (gated by Anthropic's 30K-tokens-per-minute
#   per-org rate limit, so we run cases sequentially).

name: Calibrate W2 eval baseline

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional one-line note to append to the run summary"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: agent-service

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-service
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run W2 eval suite + save baseline
        env:
          AGENT_URL: ${{ vars.AGENT_URL || 'https://copilot-agent-production-ba87.up.railway.app' }}
          AGENT_SHARED_SECRET: ${{ secrets.AGENT_SHARED_SECRET }}
        run: |
          python -m evals.w2.runner \
            --json eval-results.json \
            --save-baseline evals/w2/baseline.json

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w2-baseline-eval-results
          path: agent-service/eval-results.json
          retention-days: 90

      - name: Upload proposed baseline + diff
        # Don't auto-commit. Auto-pushing the baseline back to main on
        # every run created a deploy loop: each commit retriggered the
        # OpenEMR Railway deploy, which created a 60-90s 502 window
        # that flunked the late-stage cases of the NEXT calibration.
        # Instead, we surface the proposed baseline as an artifact +
        # render the diff in the step summary; the operator commits it
        # locally only when satisfied with the numbers.
        if: always()
        run: |
          {
            echo
            echo "### Proposed baseline.json (download artifact \`w2-proposed-baseline\` to commit)"
            echo
            echo '```diff'
            if [ -f evals/w2/baseline.json ]; then
              git diff --no-color -- evals/w2/baseline.json || true
            else
              echo "+ (new file)"
              cat evals/w2/baseline.json 2>/dev/null || true
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proposed baseline as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w2-proposed-baseline
          path: agent-service/evals/w2/baseline.json
          retention-days: 90

      - name: Post results summary
        if: always()
        run: |
          if [ -f eval-results.json ]; then
            {
              echo "## W2 baseline calibration"
              echo
              python -c "
          import json
          r = json.load(open('eval-results.json'))
          s = r['summary']
          print(f'Total cases run: **{s[\"total_cases\"]}**')
          print()
          print('### Per-rubric pass rates')
          print('| Rubric | Passed | Total | Rate |')
          print('|---|---|---|---|')
          for name, totals in s['rubric_totals'].items():
              rate = s['rubric_rates'][name]
              print(f\"| {name} | {totals['passed']} | {totals['total']} | {rate:.0%} |\")
          print()
          print('### Per-category pass rates (the gate compares against these)')
          print('| Category | Passed | Total | Rate |')
          print('|---|---|---|---|')
          for cat, totals in s['category_totals'].items():
              rate = s['category_rates'][cat]
              print(f\"| {cat} | {totals['passed']} | {totals['total']} | {rate:.0%} |\")
          "
            } >> "$GITHUB_STEP_SUMMARY"
          fi
